[server]
headless = true
enableCORS = false
enableXsrfProtection = false
fileWatcherType = "auto"
runOnSave = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[theme]
base = "dark"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0a0a0a"
textColor = "#f0f4ff"
primaryColor = "#0ea5e9"
font = "sans serif"
