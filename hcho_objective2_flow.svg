<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Objective 2 Flow Diagram - HCHO Hotspot Detection over India</title>
  <desc id="desc">Flow diagram showing remote sensing HCHO, fire activity, and meteorological reanalysis data processed to identify HCHO hotspots, source regions, temporal evolution, and fire-HCHO relationships.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1c33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a1f"/>
      <stop offset="100%" stop-color="#ff7f11"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { fill: #f6fbff; font: 700 48px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; }
      .subtitle { fill: #b9c7d9; font: 400 22px "Segoe UI", Arial, sans-serif; }
      .label { fill: #ffffff; font: 500 28px "Segoe UI", Arial, sans-serif; }
      .small { fill: #ffffff; font: 400 22px "Segoe UI", Arial, sans-serif; }
      .box { fill: url(#panel); rx: 28; ry: 28; filter: url(#shadow); }
      .arrow { stroke: #ffb24b; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrowhead { fill: #ffb24b; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="80" y="86" class="title">Objective 2</text>
  <text x="80" y="128" class="subtitle">HCHO hotspot mapping during biomass burning seasons using remote sensing and fire data</text>

  <rect x="70" y="220" width="390" height="140" class="box"/>
  <rect x="70" y="390" width="390" height="140" class="box"/>
  <rect x="70" y="560" width="390" height="140" class="box"/>

  <text x="265" y="272" text-anchor="middle" class="label">Remote sensing data</text>
  <text x="265" y="308" text-anchor="middle" class="small">(Sentinel-5P HCHO)</text>

  <text x="265" y="442" text-anchor="middle" class="label">Fire data</text>
  <text x="265" y="478" text-anchor="middle" class="small">(MODIS / VIIRS active fire)</text>

  <text x="265" y="612" text-anchor="middle" class="label">Reanalysis meteorology</text>
  <text x="265" y="648" text-anchor="middle" class="small">(ERA5 / IMDAA / MERRA-2)</text>

  <rect x="610" y="250" width="390" height="300" class="box"/>
  <text x="805" y="352" text-anchor="middle" class="label">Processing Pipeline</text>
  <text x="805" y="396" text-anchor="middle" class="label">Python + Google Earth Engine</text>
  <text x="805" y="450" text-anchor="middle" class="small">Pre-processing, masking, aggregation</text>
  <text x="805" y="486" text-anchor="middle" class="small">and hotspot detection</text>

  <rect x="1110" y="180" width="420" height="125" class="box"/>
  <rect x="1110" y="335" width="420" height="125" class="box"/>
  <rect x="1110" y="490" width="420" height="125" class="box"/>
  <rect x="1110" y="645" width="420" height="125" class="box"/>

  <text x="1320" y="232" text-anchor="middle" class="label">High-resolution HCHO hotspots</text>
  <text x="1320" y="268" text-anchor="middle" class="small">during biomass burning seasons</text>

  <text x="1320" y="387" text-anchor="middle" class="label">Source region identification</text>
  <text x="1320" y="423" text-anchor="middle" class="small">Indo-Gangetic Plain, fire zones</text>

  <text x="1320" y="542" text-anchor="middle" class="label">Temporal evolution</text>
  <text x="1320" y="578" text-anchor="middle" class="small">Hotspot growth and decay patterns</text>

  <text x="1320" y="697" text-anchor="middle" class="label">Fire-HCHO correlation</text>
  <text x="1320" y="733" text-anchor="middle" class="small">Transport influence and enhancement</text>

  <line x1="460" y1="290" x2="610" y2="320" class="arrow"/>
  <polygon points="610,320 592,312 596,330" class="arrowhead"/>

  <line x1="460" y1="460" x2="610" y2="400" class="arrow"/>
  <polygon points="610,400 592,392 596,410" class="arrowhead"/>

  <line x1="460" y1="630" x2="610" y2="480" class="arrow"/>
  <polygon points="610,480 592,472 596,490" class="arrowhead"/>

  <line x1="1000" y1="340" x2="1110" y2="242" class="arrow"/>
  <polygon points="1110,242 1091,236 1098,254" class="arrowhead"/>

  <line x1="1000" y1="390" x2="1110" y2="397" class="arrow"/>
  <polygon points="1110,397 1092,389 1092,405" class="arrowhead"/>

  <line x1="1000" y1="440" x2="1110" y2="552" class="arrow"/>
  <polygon points="1110,552 1092,546 1100,530" class="arrowhead"/>

  <line x1="1000" y1="490" x2="1110" y2="707" class="arrow"/>
  <polygon points="1110,707 1093,699 1105,687" class="arrowhead"/>

  <text x="80" y="790" class="subtitle">Data fusion: HCHO columns + fire counts + wind/reanalysis fields</text>
</svg>
